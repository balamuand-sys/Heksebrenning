<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <!-- Veldig viktig for PWA og mobilvisning -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- PWA / Hjemskjerm innstillinger (Apple & Android) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Heksejakt" />
    <meta name="theme-color" content="#09090b" />
    
    <!-- Peker til ikonet i public-mappen -->
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="icon" type="image/png" href="/icon.png" />
    
    <title>Heksejakt 2026</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Importmap forteller nettleseren hvordan den skal tolke biblioteker -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0"
        }
      }
    </script>
  </head>
  <body class="bg-zinc-950 text-zinc-200">
    <div id="root"></div>
    
    <script type="module">
      import React from 'react';
      import ReactDOM from 'react-dom/client';
      import App from '/src/App.jsx';

      const rootElement = document.getElementById('root');
      if (rootElement) {
        const root = ReactDOM.createRoot(rootElement);
        root.render(
          React.createElement(React.StrictMode, null, 
            React.createElement(App)
          )
        );
      }
    </script>
  </body>
</html>
